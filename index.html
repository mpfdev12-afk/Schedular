<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA: Primary icon / favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/pwa-512.png" />

    <!-- PWA: iOS home-screen icon -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA: Web App Manifest (Manual) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- PWA: Theme colour -->
    <meta name="theme-color" content="#4f46e5" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Yours Wellness Companion</title>
    <meta
      name="description"
      content="Book personal advisory sessions across Mental, Physical and Financial wellness with verified advisors."
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Schedular" />

    <!-- Premium Typography System -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script 
      type="module" 
      src="/src/main.jsx" 
      onerror="
        console.error('Failed to load main module. Attempting Service Worker recovery...');
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(regs => {
            for(let reg of regs) reg.unregister();
            window.location.reload(true);
          });
        }
      "
    ></script>
    <script>
      // Diagnostic script for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.getRegistration().then((reg) => {
            if (reg) {
              console.log('✅ PWA: Service Worker is active:', reg.scope);
            } else {
              console.log('❌ PWA: No Service Worker found');
            }
          });
        });
      }
    </script>
  </body>
</html>
